name: Daily Market Scan

on:
  schedule:
    # Her gün 06:00 UTC = Türkiye 09:00
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Repo'ya commit yapabilmek için

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scanner
        env:
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
        run: python scanner.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scans/ state/
          # Sadece değişiklik varsa commit et
          if git diff --staged --quiet; then
            echo "Yeni scan dosyası yok, commit atlandı"
          else
            git commit -m "Daily scan: $(date -u +%Y-%m-%d_%H%M)"
            git push
          fi
